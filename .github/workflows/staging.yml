name: Deployment NextJS To Staging

on:
    push:
        branches:
            - master

env:
  IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME }}/nextjs-project


jobs:

    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: build docker image
              run: docker build -t ${{ env.IMAGE_NAME }} .
              #  --build-arg DATABASE_URL="${{ secrets.DATABASE_URL }}" --build-arg NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}" --build-arg NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" --build-arg AUTH_TRUST_HOST=true --build-arg RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}"

            - name: tag image by version
              run: docker tag ${{env.IMAGE_NAME}} ${{env.IMAGE_NAME}}:v${{github.run_number}}

            - name: docker login
              uses: docker/login-action@v3
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: push image to dockerhub
              run: docker push ${{env.IMAGE_NAME}}:v${{github.run_number}}

            - name: push image to dockerhub
              run: docker push ${{env.IMAGE_NAME}}

    Deploy:
        runs-on: ubuntu-latest
        needs: build-and-push
        steps:
          - uses: appleboy/ssh-action@v1
            with:
                host: ${{ secrets.VPS_HOST }}
                username: ${{ secrets.VPS_USERNAME }}
                password: ${{ secrets.VPS_PASSWORD }}
                script: |
                    cd /home/user/nextjs-devops-script
                    sudo docker compose down

                    DATABASE_URL="${{ secrets.DATABASE_URL }}" \
                    NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}" \
                    NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
                    RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
                    AUTH_TRUST_HOST="true" \

                    sudo docker compose up -d